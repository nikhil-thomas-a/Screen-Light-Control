kind = "mobile"
previewPath = "/"
title = "Screen Light"
version = "1.0.0"
id = "artifacts/screen-light"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 20823

[services.development]
run = "pnpm --filter @workspace/screen-light run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/screen-light", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/screen-light", "run", "serve" ]

[services.env]
PORT = "20823"
BASE_PATH = "/"
